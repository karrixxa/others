<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SNN Experiments · read-only</title>
<style>
  :root { --bg:#0e1117; --bg2:#161b27; --line:#242b3a; --txt:#c7d0e0; --mut:#5f6b82;
          --ok:#45d483; --warn:#ffce5c; --err:#f0788c; --acc:#5eead4; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:14px/1.5 ui-sans-serif,system-ui,sans-serif; }
  header { padding:12px 18px; background:var(--bg2); border-bottom:1px solid var(--line);
           display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  h1 { font-size:15px; margin:0; }
  .pill { font-size:12px; padding:2px 8px; border-radius:10px; background:var(--bg); border:1px solid var(--line); }
  .state-running{color:var(--ok)} .state-completed{color:var(--acc)}
  .state-interrupted,.state-failed{color:var(--err)} .state-starting{color:var(--warn)}
  select { background:var(--bg); color:var(--txt); border:1px solid var(--line); border-radius:6px; padding:4px 8px; }
  main { padding:16px; display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .card { background:var(--bg2); border:1px solid var(--line); border-radius:10px; padding:12px; }
  .card.full { grid-column:1/3; }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--mut); margin:0 0 8px; }
  .kv { display:grid; grid-template-columns:auto 1fr; gap:2px 12px; font-size:13px; }
  .kv b { color:var(--mut); font-weight:500; }
  img { width:100%; border:1px solid var(--line); border-radius:6px; background:var(--bg); display:block; }
  pre { margin:0; max-height:240px; overflow:auto; font-size:11px; color:var(--mut); white-space:pre-wrap; }
  table { width:100%; border-collapse:collapse; font-size:11px; }
  th,td { border-bottom:1px solid var(--line); padding:3px 6px; text-align:right; }
  th:first-child,td:first-child { text-align:left; }
  .ro { color:var(--warn); font-size:11px; }
</style>
</head>
<body>
<header>
  <h1>SNN Experiments</h1>
  <span class="ro">read-only · window into cluster runs (no control)</span>
  <label>run <select id="run"></select></label>
  <span class="pill" id="state">—</span>
  <span class="pill" id="progress">—</span>
  <span class="pill" id="updated">—</span>
</header>
<main>
  <div class="card full">
    <h2>Description / Hypothesis</h2>
    <div id="desc" style="white-space:pre-wrap"></div>
  </div>
  <div class="card">
    <h2>Current status</h2>
    <div class="kv" id="status"></div>
  </div>
  <div class="card">
    <h2>Recent events</h2>
    <pre id="events"></pre>
  </div>
  <div class="card"><h2>Spike raster (spikes only)</h2><img id="p-raster" alt="raster"/></div>
  <div class="card"><h2>Charge over time</h2><img id="p-charge" alt="charge"/></div>
  <div class="card"><h2>Weights ÷ cap (current)</h2><img id="p-weights" alt="weights"/></div>
  <div class="card"><h2>Ownership over time</h2><img id="p-ownership" alt="ownership"/></div>
  <div class="card full">
    <h2>Completed runs (summary)</h2>
    <div style="overflow:auto"><table id="summary"></table></div>
  </div>
</main>
<script>
const $ = id => document.getElementById(id);
let runId = "current";

async function j(u){ try { const r=await fetch(u); return r.ok? r.json():null; } catch { return null; } }
async function t(u){ try { const r=await fetch(u); return r.ok? r.text():""; } catch { return ""; } }

async function loadRuns(){
  const runs = await j("/api/runs") || [];
  const sel = $("run"); const prev = sel.value;
  sel.innerHTML = `<option value="current">current (latest)</option>` +
    runs.map(r=>`<option value="${r.id}">${r.id} · ${r.state||""}</option>`).join("");
  sel.value = prev || "current";
}

function bust(u){ return u + "?_=" + Date.now(); }   // cache-bust the PNGs

async function refresh(){
  runId = $("run").value || "current";
  const s = await j(`/api/run/${runId}/status`);
  if (s){
    $("state").textContent = s.state || "—";
    $("state").className = "pill state-" + (s.state||"");
    $("progress").textContent = `combos ${s.done_combos ?? 0}/${s.total_combos ?? 0}`;
    $("updated").textContent = s.updated ? "updated " + new Date(s.updated*1000).toLocaleTimeString() : "";
    const c = s.current || {};
    $("status").innerHTML = [
      ["combo", c.combo], ["seed", c.seed], ["schedule", c.schedule], ["dwell", c.dwell],
      ["steps", c.steps], ["presentations", c.total_presentations],
      ["mean consistency", c.mean_consistency], ["distinct owners", c.distinct_owners],
      ["message", s.message],
    ].filter(([,v])=>v!=null).map(([k,v])=>`<b>${k}</b><span>${v}</span>`).join("");
  }
  $("desc").textContent = await t(`/api/run/${runId}/description`);
  const ev = await j(`/api/run/${runId}/events?tail=40`) || [];
  $("events").textContent = ev.map(e=>`${new Date(e.t*1000).toLocaleTimeString()}  ${e.kind}  ${
    Object.entries(e).filter(([k])=>!["t","kind"].includes(k)).map(([k,v])=>k+"="+JSON.stringify(v)).join(" ")}`).join("\n");
  for (const [el,name] of [["p-raster","current_raster.png"],["p-charge","current_charge.png"],
                           ["p-weights","current_weights.png"],["p-ownership","current_ownership.png"]]){
    $(el).src = bust(`/api/run/${runId}/plot/${name}`);
  }
  const sum = await j(`/api/run/${runId}/summary`) || [];
  if (sum.length){
    const cols = Object.keys(sum[0]);
    $("summary").innerHTML = "<tr>"+cols.map(c=>`<th>${c}</th>`).join("")+"</tr>" +
      sum.map(r=>"<tr>"+cols.map(c=>`<td>${r[c]}</td>`).join("")+"</tr>").join("");
  } else $("summary").innerHTML = "<tr><td>no completed combos yet</td></tr>";
}

$("run").addEventListener("change", refresh);
(async ()=>{ await loadRuns(); await refresh(); setInterval(async()=>{ await loadRuns(); await refresh(); }, 3000); })();
</script>
</body>
</html>
