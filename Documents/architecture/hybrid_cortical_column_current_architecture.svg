  <text class="title" x="60" y="48">Paradigm — dual-path architecture (P + H)</text>
  <text class="body" x="60" y="74">Path H current truth: hybrid_cortical_biological · Stages 8–10 · T1–T9 PASS · SVG is authority for bio</text>
  <text class="small" x="60" y="96">Legacy hybrid_cortical (catalog / prior bias / symbolic L5 / 2.0·0.5 gain) is footnote-only — not Path H primary</text>

