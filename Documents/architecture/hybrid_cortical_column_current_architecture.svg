  <text class="head" x="112" y="340">Layer1Relay</text>
  <text class="body" x="112" y="366">9 cells × E / I / E′ relay</text>
  <text class="body" x="112" y="390">spiking + refractory</text>
  <text class="body" x="112" y="414">descending inhibition (prior pulse)</text>

  <rect class="node" x="390" y="310" width="280" height="150" rx="10"/>
  <text class="head" x="412" y="340">NucleusNetwork</text>
  <text class="body" x="412" y="366">4 excitatory ring competitors</text>
  <text class="body" x="412" y="390">NUCLEUS_RING_SIZE = len(LINE_IDS) = 4</text>
  <text class="body" x="412" y="414">WTA + inhibitory flow + local maps</text>

