  <text class="body" x="1092" y="366">winner neuron + output symbol</text>
  <text class="body" x="1092" y="390">events, timing + online learning</text>
  <text class="body" x="1092" y="414">T1–T8 PASS · T9 PARTIAL</text>

  <rect class="node" x="1410" y="310" width="410" height="150" rx="10"/>
  <text class="head" x="1432" y="340">DescendingInhibition</text>
  <text class="body" x="1432" y="366">from current production pulse</text>
  <text class="body" x="1432" y="390">applies to Layer1Relay next pulse</text>
  <text class="body" x="1432" y="414">production-only feedback loop</text>

