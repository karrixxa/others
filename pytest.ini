[pytest]
testpaths = tests
markers =
    biological: Phase 8 production biology validation gate (rotation 4/4, integrity)
    biological_lab: experimental biological lab validation (never production promotion)
    cortical_column_lab: hybrid cortical-column lab path (never production default)
filterwarnings =
    ignore:Using `httpx` with `starlette.testclient`:starlette.exceptions.StarletteDeprecationWarning
